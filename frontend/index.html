<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zotgle</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap");
    </style>
  </head>
  <body>
    <script src="main.js" defer></script>
    <div id="header">
      <div class="logo-container">
        <span class="logo blue">Z</span>
        <span class="logo red">o</span>
        <span class="logo yellow">t</span>
        <span class="logo blue">g</span>
        <span class="logo green">l</span>
        <span class="logo red">e</span>
      </div>
      <form id="search">
        <input type="text" id="query" name="query" placeholder="search here" />
        <input type="submit" value="Zotgle Search" />
      </form>
    </div>
    <div id="results">
      <span id="time"></span>
      <ul id="urls"></ul>
    </div>
  </body>
</html>
